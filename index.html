<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIP CENTURION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff41;
      --green-dim: #00aa2b;
      --green-glow: #00ff4166;
      --dark: #020c02;
      --darker: #010801;
      --red: #ff2244;
      --amber: #ffaa00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: var(--green);
      overflow: hidden;
      position: relative;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    /* Animated grid background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,65,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 8s linear infinite;
      z-index: 0;
    }

    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(24px, 5vw, 42px);
      letter-spacing: 0.3em;
      color: var(--green-dim);
      text-shadow: 0 0 20px var(--green-glow);
      text-align: center;
    }

    /* Timer display */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .timer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 25vw, 200px);
      line-height: 1;
      letter-spacing: 0.05em;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 30px var(--green-glow),
        0 0 60px var(--green-glow);
      transition: color 0.3s, text-shadow 0.3s;
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: center;
    }

    .timer.urgent {
      color: var(--red);
      text-shadow:
        0 0 10px var(--red),
        0 0 30px rgba(255,34,68,0.5),
        0 0 60px rgba(255,34,68,0.3);
      animation: urgentPulse 0.5s ease-in-out infinite;
    }

    @keyframes urgentPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .timer-label {
      font-size: 13px;
      letter-spacing: 0.4em;
      color: var(--green-dim);
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* Progress bar */
    .progress-track {
      width: clamp(280px, 60vw, 500px);
      height: 4px;
      background: rgba(0,255,65,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      box-shadow: 0 0 8px var(--green);
      transform-origin: left;
      transform: scaleX(1);
      transition: transform 1s linear, background 0.3s;
      border-radius: 2px;
    }

    .progress-fill.urgent {
      background: linear-gradient(90deg, #aa0022, var(--red));
      box-shadow: 0 0 8px var(--red);
    }

    /* Round counter */
    .round-display {
      font-size: 12px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      opacity: 0.5;
      text-transform: uppercase;
    }

    /* START button */
    .btn-start {
      position: relative;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 7vw, 56px);
      letter-spacing: 0.25em;
      color: var(--dark);
      background: var(--green);
      border: none;
      padding: 20px 70px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      box-shadow:
        0 0 20px var(--green-glow),
        0 0 50px var(--green-glow),
        inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
      text-shadow: none;
    }

    .btn-start:hover {
      background: #00ff66;
      box-shadow:
        0 0 30px var(--green),
        0 0 80px var(--green-glow),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .btn-start:active {
      transform: translateY(1px);
      box-shadow: 0 0 15px var(--green-glow);
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      clip-path: inherit;
    }

    /* Hidden SoundCloud iframe */
    #sc-widget {
      position: fixed;
      bottom: -200px;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Status line */
    .status {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      opacity: 0.4;
      text-transform: uppercase;
      min-height: 16px;
      transition: opacity 0.3s;
    }

    /* Flicker animation on load */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.4; }
      94% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
    }

    .container {
      animation: flicker 6s ease-in-out infinite;
    }

    /* Horn flash overlay */
    .horn-flash {
      position: fixed;
      inset: 0;
      background: var(--green);
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.05s;
    }

    .horn-flash.active {
      opacity: 0.18;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="horn-flash" id="hornFlash"></div>

  <div class="container">
    <div class="title">⚡ Tip Centurion Timer ⚡</div>

    <div class="timer-wrap">
      <div class="timer" id="timerDisplay">1:00</div>
      <div class="timer-label">minutes remaining</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="round-display" id="roundDisplay">round — —</div>

    <button class="btn-start" id="startBtn" onclick="handleStart()">START</button>

    <div class="status" id="statusLine">ready to go</div>
  </div>

  <!-- Hidden SoundCloud widget -->
  <iframe
    id="sc-widget"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/darude/sandstorm-radio-edit&color=%2300ff41&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"
  ></iframe>

  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script>
    const DURATION = 60; // seconds

    let widget;
    let widgetReady = false;
    let timerInterval = null;
    let secondsLeft = DURATION;
    let running = false;
    let round = 0;

    // Horn sound via Web Audio API
    function playHorn() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;

        // Three-part horn blast
        const blasts = [
          { freq: 440, start: 0, dur: 0.18 },
          { freq: 554, start: 0.22, dur: 0.18 },
          { freq: 659, start: 0.44, dur: 0.45 },
        ];

        blasts.forEach(({ freq, start, dur }) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, now + start);
          osc.frequency.linearRampToValueAtTime(freq * 0.92, now + start + dur);

          gain.gain.setValueAtTime(0, now + start);
          gain.gain.linearRampToValueAtTime(0.45, now + start + 0.02);
          gain.gain.setValueAtTime(0.45, now + start + dur - 0.05);
          gain.gain.linearRampToValueAtTime(0, now + start + dur);

          osc.start(now + start);
          osc.stop(now + start + dur + 0.05);
        });
      } catch (e) {
        console.log('Audio context error:', e);
      }
    }

    // Flash the screen
    function triggerFlash() {
      const flash = document.getElementById('hornFlash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 120);
    }

    // Update the display
    function updateDisplay() {
      const mins = Math.floor(secondsLeft / 60);
      const secs = secondsLeft % 60;
      const display = `${mins}:${secs.toString().padStart(2, '0')}`;
      const timerEl = document.getElementById('timerDisplay');
      const progressEl = document.getElementById('progressFill');

      timerEl.textContent = display;

      const fraction = secondsLeft / DURATION;
      progressEl.style.transform = `scaleX(${fraction})`;

      const isUrgent = secondsLeft <= 10;
      timerEl.classList.toggle('urgent', isUrgent);
      progressEl.classList.toggle('urgent', isUrgent);
    }

    function setStatus(msg) {
      document.getElementById('statusLine').textContent = msg;
    }

    function startTimer() {
      round++;
      document.getElementById('roundDisplay').textContent = `round ${round.toString().padStart(2, '0')}`;
      secondsLeft = DURATION;
      updateDisplay();
      setStatus('playing sandstorm...');

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsLeft--;
        updateDisplay();

        if (secondsLeft <= 0) {
          clearInterval(timerInterval);
          onTimerEnd();
        }
      }, 1000);
    }

    function onTimerEnd() {
      playHorn();
      triggerFlash();
      setStatus('🔔 time! restarting...');

      // Restart music from beginning
      if (widgetReady && widget) {
        try {
          widget.seekTo(0);
          widget.play();
        } catch (e) {
          console.log('SC widget error:', e);
        }
      }

      setTimeout(() => {
        startTimer();
      }, 1000);
    }

    function handleStart() {
      if (running) return;
      running = true;

      document.getElementById('startBtn').style.display = 'none';
      setStatus('loading music...');

      // Try to play via widget
      if (widgetReady && widget) {
        try {
          widget.seekTo(0);
          widget.play();
          setStatus('playing sandstorm...');
        } catch (e) {
          setStatus('music unavailable — timer running');
        }
      } else {
        setStatus('music loading — timer running');
      }

      startTimer();
    }

    // Init SoundCloud widget
    window.addEventListener('load', () => {
      try {
        const iframe = document.getElementById('sc-widget');
        widget = SC.Widget(iframe);

        widget.bind(SC.Widget.Events.READY, () => {
          widgetReady = true;
          console.log('SC widget ready');
          if (running) {
            setStatus('playing sandstorm...');
          }
        });

        widget.bind(SC.Widget.Events.ERROR, () => {
          console.log('SC widget error');
          widgetReady = false;
        });
      } catch (e) {
        console.log('SC init error:', e);
      }
    });
  </script>
</body>
</html>
